<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="slider.css">
    <title>Document</title>
</head>
<body>
    <div class="slideshow-container">

        <div class="img-slider fade">
            <img src="./images/Aloui.jpg" alt="">
        </div>

        <div class="img-slider fade">
            <img src="./images/bali-villa.jpg" alt="">
        </div>

        <div class="img-slider fade">
            <img src="./images/exotic.jpg" alt="">
        </div>

        <div class="img-slider fade">
            <img src="./images/villa seminyak.jpg" alt="">
        </div>

    </div>


    <script>
        let slideIndex = 0;
        showSlides();
        
        function showSlides() {
          let i;
          let slides = document.getElementsByClassName("img-slider");
          for (i = 0; i < slides.length; i++) {
            slides[i].style.display = "none";  
          }
          slideIndex++;
          if (slideIndex > slides.length) {slideIndex = 1}    
          slides[slideIndex-1].style.display = "block";  
          setTimeout(showSlides, 4000); // Change image every 2 seconds
        }
        </script>
</body>
</html>
